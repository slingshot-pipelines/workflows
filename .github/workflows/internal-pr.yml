name: (internal) pr

on:
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed-components: ${{ steps.changed-components.outputs.changed-components }}
      changed-component-types: ${{ steps.changed-components.outputs.changed-component-types }}
      changed-components-by-type: ${{ steps.changed-components.outputs.changed-components-by-type }}
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Detect changed components
        id: changed-components
        uses: slingshot-pipelines/action-components-changed@v1

  check-components:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"components"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/check-components.yml@check-components/v0
    secrets: inherit

  check-github-workflows:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"github-workflows"') }}
    uses: slingshot-pipelines/workflows/.github/workflows/check-github-workflows.yml@check-github-workflows/v0
    strategy:
      matrix:
        COMPONENT: ${{ fromJSON(needs.detect-changes.outputs.changed-components-by-type).github-workflows }}
    with:
      COMPONENT: ${{ matrix.COMPONENT }}
    secrets: inherit

  generate-docs:
    needs:
      - detect-changes
    if: ${{ contains(needs.detect-changes.outputs.changed-component-types, '"github-workflows"') }}
    uses: ./.github/workflows/internal-docs.yml
    secrets: inherit

  pr-ready:
    if: ${{ always() }}
    needs:
      - detect-changes
      - check-components
      - check-github-workflows
      - generate-docs
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Emit PR ready check
        uses: slingshot-pipelines/action-pr-ready@v0
        with:
          NEEDS: ${{ toJSON(needs) }}
