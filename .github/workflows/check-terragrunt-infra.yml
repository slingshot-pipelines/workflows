name: check-terragrunt-infra

on:
  workflow_call:
    inputs:
      COMPONENT:
        type: string
        required: true
      TERRAFORM_VERSION:
        type: string
        required: true
      TERRAGRUNT_VERSION:
        type: string
        required: true
      TRIGGER_ALL:
        type: boolean
        required: false
        default: false
      BUILD_CACHE_KEY:
        required: false
        type: string
        description: If set, the action will try to restore a build cache using the specified key
      BUILD_CACHE_PATH:
        required: false
        type: string
        description: If set, the action will try to restore a build cache for the specified path
    secrets:
      WRITER_APP_CLIENT_ID:
        required: false
      WRITER_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:

  build-matrix:
    name: (${{ inputs.COMPONENT }}) terragrunt-matrix
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.build-matrix.outputs.stacks-changed }}
      units-dir: ${{ steps.pick-infra-dirs.outputs.units-dir }}
      stacks-dir: ${{ steps.pick-infra-dirs.outputs.stacks-dir }}
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Component info
        id: component-info
        uses: slingshot-pipelines/action-component-info@v0
        with:
          component: ${{ inputs.COMPONENT }}
      -
        name: Pick directories
        id: pick-component-dirs
        env:
          COMPONENT_INFO: ${{ steps.component-info.outputs.INFO }}
        run: |
          COMPONENT_TYPE=$(echo "$COMPONENT_INFO" | jq -rc '.type')
          if [[ -z "$COMPONENT_TYPE" ]]; then
            >&2 echo "Error determining component type"
            exit 1
          fi

          COMPONENT_PATH=$(echo "$COMPONENT_INFO" | jq -rc '.path')
          if [[ -z "$COMPONENT_PATH" ]]; then
            >&2 echo "Error determining component path"
            exit 1
          fi

          if [[ "$COMPONENT_TYPE" == "lambda" ]]; then
            echo "units-dir=$COMPONENT_PATH/infra/units" | tee -a "$GITHUB_OUTPUT"
            echo "stacks-dir=$COMPONENT_PATH/infra/stacks" | tee -a "$GITHUB_OUTPUT"
          else
            echo "units-dir=$COMPONENT_PATH/units" | tee -a "$GITHUB_OUTPUT"
            echo "stacks-dir=$COMPONENT_PATH/stacks" | tee -a "$GITHUB_OUTPUT"
          fi
      -
        name: Detect changes
        uses: slingshot-pipelines/action-terragrunt/matrix@v0
        id: build-matrix
        with:
          UNITS_DIR: ${{ steps.pick-component-dirs.outputs.units-dir }}
          STACKS_DIR: ${{ steps.pick-component-dirs.outputs.stacks-dir }}
          TRIGGER_ALL: ${{ inputs.TRIGGER_ALL }}

  lint:
    name: (${{ inputs.COMPONENT }}) terragrunt-lint
    needs:
      - build-matrix
    if: ${{ (needs.build-matrix.outputs.changes || '[]') != '[]' }}
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Install Terraform/Terragrunt
        uses: slingshot-pipelines/action-terragrunt/install@v0
        with:
          TERRAGRUNT_VERSION: ${{ inputs.TERRAGRUNT_VERSION }}
          TERRAFORM_VERSION: ${{ inputs.TERRAFORM_VERSION }}
      -
        name: Lint Terraform & Terragrunt code
        uses: slingshot-pipelines/action-terragrunt/lint@v0
        with:
          UNITS_DIR: ${{ needs.build-matrix.outputs.units-dir }}
          STACKS_DIR: ${{ needs.build-matrix.outputs.stacks-dir }}
          APP_CLIENT_ID: ${{ secrets.WRITER_APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.WRITER_APP_PRIVATE_KEY }}

  plan:
    name: terragrunt-plan (${{ inputs.COMPONENT }})
    needs: 
      - build-matrix
      - lint
    if: ${{ (needs.build-matrix.outputs.changes || '') != '[]' }}
    uses: rx-refill-reminders/pipeline/.github/workflows/terragrunt-plan.yml@terragrunt-plan/v0
    with:
      COMPONENT: ${{ inputs.COMPONENT }}
      TERRAGRUNT_VERSION: ${{ inputs.TERRAGRUNT_VERSION }}
      TERRAFORM_VERSION: ${{ inputs.TERRAFORM_VERSION }}
      STACKS_DIR: ${{ needs.build-matrix.outputs.stacks-dir }}
      STACKS: ${{ needs.build-matrix.outputs.changes }}
      BUILD_CACHE_KEY: ${{ inputs.BUILD_CACHE_KEY }}
      BUILD_CACHE_PATH: ${{ inputs.BUILD_CACHE_PATH }}
