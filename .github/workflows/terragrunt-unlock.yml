name: terragrunt-unlock

on:

  workflow_call:
    inputs:
      STACK:
        description: 'stack:'
        type: string
        required: true
      UNIT:
        description: 'unit:'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:

  unlock:
    name: unlock (${{ inputs.STACK }}/${{ inputs.UNIT }})
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Get stack info
        id: stack-info
        uses: rx-refill-reminders/pipeline/.github/actions/tg-stack-info@tg-stack-info/v0
        with:
          INFO_FILE: infra/stacks/${{ inputs.STACK }}/stack.yml
      -
        name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.stack-info.outputs.assume-role-arn }}
          aws-region: us-east-1
      -
        name: Delete S3 lockfile
        env:
          STATES_BUCKET: ${{ steps.stack-info.outputs.states-bucket }}
          LOCKFILE_KEY: stacks/${{ inputs.STACK }}/.terragrunt-stack/${{ inputs.UNIT }}/terraform.tfstate.tflock
        run: |
          LOCKFILE_KEY="${LOCKFILE_KEY#/}"
          LOCKFILE_URI="s3://${STATES_BUCKET}/${LOCKFILE_KEY}"

          echo "Deleting lockfile: ${LOCKFILE_URI}"
          aws s3 rm "${LOCKFILE_URI}"

          echo "Deleted \`${LOCKFILE_URI}\`" >> "$GITHUB_STEP_SUMMARY"
