name: check-github-action

on:
  workflow_call:
    inputs:
      COMPONENT:
        required: true
        type: string
      GENERATE_DOCS:
        type: boolean
        default: true
        required: false
    secrets:
      WRITER_APP_CLIENT_ID:
        required: false
      WRITER_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:

  lint-test-docs:
    name: (${{ inputs.COMPONENT }}) lint-test-docs
    runs-on: ubuntu-latest
    steps:
      -
        name: Fetch app token
        id: app-token
        uses: slingshot-pipelines/action-optional-app-token@v0
        with:
          CLIENT_ID: ${{ secrets.WRITER_APP_CLIENT_ID }}
          PRIVATE_KEY: ${{ secrets.WRITER_APP_PRIVATE_KEY }}
      -
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      -
        name: Lookup component info
        id: lookup-component-info
        uses: slingshot-pipelines/action-component-info@v1
        with:
          component: ${{ inputs.COMPONENT }}
      -
        name: Parse component info
        id: parse-component-info
        env:
          COMPONENT_INFO: ${{ steps.lookup-component-info.outputs.info }}
        run: |
          COMPONENT_PATH=$(echo "$COMPONENT_INFO" | jq -rc '.["path"]')
          if [[ -z "$COMPONENT_PATH" ]]; then
            >&2 echo "Error parsing component path"
            exit 1
          fi

          echo "path=$COMPONENT_PATH" | tee -a "$GITHUB_OUTPUT"

          ACTION_SOURCE_LANGUAGE=$(echo "$COMPONENT_INFO" | jq -rc '.["source-language"]')
          if [[ -z "$ACTION_SOURCE_LANGUAGE" ]]; then
            echo "::warning::Unable to parse source language"
          fi

          echo "source-language=$ACTION_SOURCE_LANGUAGE" | tee -a "$GITHUB_OUTPUT"
      -
        name: Parse action.yml
        id: parse-action-yml
        env:
          COMPONENT_PATH: ${{ steps.parse-component-info.outputs.path }}
        run: |
          ACTION_META_FILE=$(find "${COMPONENT_PATH}" -name 'action.yml' -or -name 'action.yaml' | head -n 1)
          if [[ -z "${ACTION_META_FILE}" ]]; then
            >&2 echo "No action.yml or action.yaml found"
            exit 1
          fi

          echo "meta-file=${ACTION_META_FILE}" | tee -a "$GITHUB_OUTPUT"
      -
        name: Check Makefile targets
        id: check-makefile-targets
        working-directory: ${{ steps.parse-component-info.outputs.path }}
        run: |
          HAS_LINT_TARGET=false
          if make -q lint 2>/dev/null; (( $? < 2 )); then
            HAS_LINT_TARGET=true
          fi

          HAS_TEST_TARGET=false
          if make -q unit-test 2>/dev/null; (( $? < 2 )); then
            HAS_TEST_TARGET=true
          fi

          HAS_BUILD_TARGET=false
          if make -q build 2>/dev/null; (( $? < 2 )); then
            HAS_BUILD_TARGET=true
          fi

          {
            echo "lint=$HAS_LINT_TARGET";
            echo "test=$HAS_TEST_TARGET";
            echo "build=$HAS_BUILD_TARGET";
          } | tee -a "$GITHUB_OUTPUT"
      -
        uses: actions/setup-node@v6
        if: ${{ steps.parse-component-info.outputs.source-language == 'node' }}
        with:
          node-version-file: ${{ steps.parse-component-info.outputs.path }}/package.json
          cache-dependency-path: ${{ steps.parse-component-info.outputs.path }}/package-lock.json
          cache: npm
      -
        if: ${{ steps.check-makefile-targets.outputs.lint == 'true' }}
        working-directory: ${{ steps.parse-component-info.outputs.path }}
        run: |
          make lint
      -
        if: ${{ steps.check-makefile-targets.outputs.test == 'true' }}
        working-directory: ${{ steps.parse-component-info.outputs.path }}
        run: |
          make unit-test
      -
        if: ${{ steps.check-makefile-targets.outputs.build == 'true' }}
        working-directory: ${{ steps.parse-component-info.outputs.path }}
        run: |
          make build
      -
        name: Install autodoc
        if: inputs.GENERATE_DOCS
        uses: slingshot-pipelines/action-brew-install@v0
        with:
          FORMULAS: |
            tj-actions/tap/auto-doc
      -
        name: Run autodoc
        if: inputs.GENERATE_DOCS
        env:
          ACTION_ROOT: ${{ steps.parse-component-info.outputs.path }}
          ACTION_YML: ${{ steps.parse-action-yml.outputs.meta-file }}
        run: |
          README_FILE="${ACTION_ROOT}/README.md"

          if [[ ! -f "${README_FILE}" ]]; then
            README_TITLE=$(basename "$ACTION_ROOT")

            {
              echo "# ${README_TITLE}"
              echo ""
              echo "## Inputs"
              echo ""
              echo "## Outputs"
              echo ""
            } > "${README_FILE}"
          fi

          auto-doc \
            --filename "${ACTION_YML}" \
            --output "${README_FILE}" \
            --colMaxWords 20
      -
        name: Check for changes
        id: detect-changes
        uses: tj-actions/verify-changed-files@v20
      -
        name: Commit changes if detected
        if: ${{ steps.detect-changes.outputs.files_changed == 'true' }}
        uses: planetscale/ghcommit-action@v0.2.22
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        with:
          commit_message: "generated changes (${{ inputs.COMPONENT }})"
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref }}
